name: SAP_Raid_Updater

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Update Version and Changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CLEAN_TAG=$(echo $TAG_NAME | sed 's/^1\.0\.//')

          sed -i "s/## Version: .*/## Version: $CLEAN_TAG/" SAP_Raid_Updater.toc
          echo "Updated TOC version to $CLEAN_TAG"

          CURRENT_DATE=$(date +"%Y-%m-%d")
          COMMIT_MSG=$(git log -1 --pretty=%B ${GITHUB_REF#refs/tags/})

          echo -e "# SAP Updater\n\n## v$CLEAN_TAG ($CURRENT_DATE)\n$COMMIT_MSG\n\n$(cat CHANGELOG.md | grep -v "^# SAP Updater" | tail -n +1)" > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

          echo "Updated CHANGELOG.md with new version v$CLEAN_TAG and commit message"

      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add SAP_Raid_Updater.toc CHANGELOG.md
          git commit -m "Update version to ${GITHUB_REF#refs/tags/} and update changelog [skip ci]"
          git push origin HEAD:master

      - name: Prepare Addon Folder
        run: |
          mkdir -p package/SAP_Raid_Updater
          shopt -s extglob
          cp -r !(package|.git|.github) package/SAP_Raid_Updater/

      - name: Create ZIP with tag suffix
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cd package
          zip -r SAP_Raid_Updater-v${TAG_NAME}.zip SAP_Raid_Updater/
          echo "ZIP_NAME=SAP_Raid_Updater-v${TAG_NAME}.zip" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: package/${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord Notification with Changelog
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CLEAN_TAG=$(echo $TAG_NAME | sed 's/^1\.0\.//')
          VERSION_LINE=$(head -n 3 CHANGELOG.md | tail -n 1)
          CHANGELOG=$(awk 'NR>2' CHANGELOG.md | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')

          EMBEDS=$(cat <<EOF
          [
            {
              "title": "🚀 New Version Deployed: v$CLEAN_TAG",
              "description": "SAP Raid Addon has been updated!\\n\\n**$VERSION_LINE**",
              "color": 1127128
            },
            {
              "title": "📝 Changelog",
              "description": "$CHANGELOG",
              "color": 14177041
            }
          ]
          EOF
          )
  
          echo "DISCORD_EMBEDS=$EMBEDS" >> $GITHUB_ENV

      - name: Discord Notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: 'SAP Raid Updater'
          DISCORD_AVATAR_URL: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSrblEuY_ed5K_vEyINkM3M65cM39WweQOAWA&s'
          DISCORD_EMBEDS: ${{ env.DISCORD_EMBEDS }}
        with:
          args: 'New SAP Raid Addon version released!'
